<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Mockups</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 2rem; background:#fff; color:#111; }
      h1 { margin-top: 0; }
      .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(240px,1fr)); gap:1rem; }
      a.card { display:block; border:1px solid #ddd; border-radius:14px; padding:1rem; text-decoration:none; color:inherit; transition:.2s transform,.2s box-shadow; }
      a.card:hover { transform: translateY(-2px); box-shadow:0 10px 24px rgba(0,0,0,.08); }
      .tag { display:inline-block; margin-top:.5rem; font-size:.8rem; padding:.2rem .5rem; border-radius:999px; background:linear-gradient(90deg,#ececec,#dfe9ff); }
    </style>
  </head>
  <body>
    <h1>Portfolio Mockups</h1>
    <p>複数案のデザインモックです。各ページはレスポンシブ対応です。</p>
    <div class="grid">
      <a class="card" href="./minimal-mono/index.html">
        <h2>Minimal Mono</h2>
        <p>白黒ベース、タイポグラフィ重視のミニマル案。</p>
        <span class="tag">Mock A</span>
      </a>
      <a class="card" href="./gradient-accent/index.html">
        <h2>Gradient Accent</h2>
        <p>白黒基調に控えめグラデーションを加えた案。</p>
        <span class="tag">Mock B</span>
      </a>
      <a class="card" href="./split-hero/index.html">
        <h2>Split Hero</h2>
        <p>ヒーローを2カラムで見せる就活向け案。</p>
        <span class="tag">Mock C</span>
      </a>
      <a class="card" href="./timeline-focus/index.html">
        <h2>Timeline Focus</h2>
        <p>受賞・活動を時系列で見せる案。</p>
        <span class="tag">Mock D</span>
      </a>
    </div>
  </body>
</html>
